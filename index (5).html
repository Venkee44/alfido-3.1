<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Product Page | Venkee</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <h4 class="text-white">amazon</h4>
</nav>

<!-- Product Section -->
<div class="container my-5">
  <div class="row">

    <!-- Product Image -->
    <div class="col-md-5 text-center">
      <img id="mainImage" src="https://via.placeholder.com/300" class="img-fluid">
      <div class="mt-3">
        <img src="https://via.placeholder.com/80" onclick="changeImage(this)" class="thumb">
        <img src="https://via.placeholder.com/80" onclick="changeImage(this)" class="thumb">
        <img src="https://via.placeholder.com/80" onclick="changeImage(this)" class="thumb">
      </div>
    </div>

    <!-- Product Details -->
    <div class="col-md-4">
      <h3>Sample Product Title</h3>
      <p class="text-success">In Stock</p>
      <h4>₹1,999</h4>

      <p>
        This is a sample product description. It explains features and details.
      </p>

      <button class="btn btn-warning w-100 mb-2">Add to Cart</button>
      <button class="btn btn-primary w-100">Buy Now</button>
    </div>

    <!-- Purchase Box -->
    <div class="col-md-3">
      <div class="box">
        <h5>₹1,999</h5>
        <p>FREE delivery</p>
        <button class="btn btn-warning w-100 mb-2">Add to Cart</button>
        <button class="btn btn-primary w-100">Buy Now</button>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
  <p>© 2026 Venkee | Amazon UI Clone</p>
</footer>

<script src="script.js"></script>

</body>
</html>
